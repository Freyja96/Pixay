<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pixay - Mis imágenes</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-pixay { background-color: #0b1d2a; padding: 10px 20px; }
        .nav-link, .navbar-brand { color: white !important; }
        .search-bar { border-radius: 5px 0 0 5px; border: none; }
        .search-btn { background-color: white; border: none; color: #ff8c00; border-radius: 0 5px 5px 0; }
        .profile-section { color: white; display: flex; align-items: center; gap: 10px; }
        .profile-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }

        .breadcrumb-pixay { padding: 20px 0; color: #6c757d; font-size: 0.9rem; }
        .breadcrumb-pixay span { color: #ff8c00; font-weight: bold; }

        /* Estilos para la galería */
        .gallery-item { border-radius: 15px; overflow: hidden; margin-bottom: 20px; border: 1px solid #ddd; }
        .gallery-item img { width: 100%; display: block; object-fit: cover; }

        /* Botón flotante inferior */
        .btn-upload {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #4facfe;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 30px;
            border: 4px solid #0b1d2a;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-decoration: none;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-pixay sticky-top">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" href="#">PIXAY</a>

        <div class="d-flex w-50">
            <select class="form-select w-auto bg-info text-white border-0" style="border-radius: 5px 0 0 5px;">
                <option>Todas las categorías</option>
            </select>
            <input type="text" class="form-control search-bar" placeholder="Buscar...">
            <button class="search-btn"><i class="bi bi-search"></i></button>
        </div>

        <div class="profile-section">
            <i class="bi bi-bell-fill text-info fs-4"></i>
            <span class="ms-3">Paula</span>
            <img src="tu-imagen-perfil.jpg" alt="Perfil" class="profile-img">
        </div>
    </div>
</nav>

<div class="container">
    <div class="breadcrumb-pixay">
        Mi perfil > <span>Mis imágenes</span>
    </div>

    <div class="row">
        <div class="col-md-3">
            <div class="gallery-item">
                <img src="tu-imagen-gato-galaxia.jpg" alt="Imagen 1">
            </div>
        </div>

        <div class="col-md-3">
            <div class="gallery-item">
                <img src="tu-imagen-gato-pajarita.jpg" alt="Imagen 2">
            </div>
        </div>

        <div class="col-md-3">
            <div class="gallery-item">
                <img src="tu-imagen-gato-cuadro.jpg" alt="Imagen 3">
            </div>
            <div class="gallery-item">
                <img src="tu-imagen-tres-gatos.jpg" alt="Imagen 4">
            </div>
        </div>

        <div class="col-md-3">
            <div class="gallery-item">
                <img src="tu-imagen-gato-primer-plano.jpg" alt="Imagen 5">
            </div>
        </div>
    </div>
</div>

<a href="#" class="btn-upload">
    <i class="bi bi-plus-lg"></i>
</a>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
