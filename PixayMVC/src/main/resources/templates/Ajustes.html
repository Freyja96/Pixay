<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ajustes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .fondo{
            background-color: #f7f7f7;
        }

        .cajas {
            background-color: #33484B40;
        }

        .espaciadoFlecha {
            margin-left: 100px;
        }
    </style>
</head>
<body class="container-md fondo">
    <header class="bg-dark">
        <div class="container px-5 w-100">
            <h1 class="text-light">Cabecera de ejemplo</h1>
        </div>
    </header>
    <div class="container py-5 align-self-center">
        <div class="row mt-5">
            <div class="col-md-6">
                <div>
                    <img src="./imagenes/fotoAjustes.png" class="img-fluid w-70" alt="Imagen Ajustes">
                </div>
            </div>
            <div class="col-md-6 mt-5 pt-3">
                <div class="row border rounded cajas pt-2">
                    <div class="col-md-8">
                        <h2>Visibilidad de Perfil</h2>
                    </div>
                    <div class="col-md-1 mx-5 pt-1">
                        <svg class="espaciadoFlecha" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" style="fill: rgba(0, 0, 0, 0.65);transform: rotate(-90deg) ;"><path d="M11.178 19.569a.998.998 0 0 0 1.644 0l9-13A.999.999 0 0 0 21 5H3a1.002 1.002 0 0 0-.822 1.569l9 13z"></path></svg>
                    </div>
                </div>
                <div class="row border rounded cajas pt-2 mt-2">
                    <div class="col-md-8">
                        <h2>Link a Pixay</h2>
                    </div>
                    <div class="col-md-1 mx-5 pt-1">
                        <svg class="espaciadoFlecha" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="fill: rgba(0, 0, 0, 0.65);transform:rotate(-90deg) ;"><path d="M11.178 19.569a.998.998 0 0 0 1.644 0l9-13A.999.999 0 0 0 21 5H3a1.002 1.002 0 0 0-.822 1.569l9 13z"></path></svg>
                    </div>
                </div>
                <div class="row border rounded cajas pt-2 mt-2">
                    <div class="col-md-8 ">
                        <h2>Permisos y actividad</h2>
                    </div>
                    <div class="col-md-1 mx-5 pt-1">
                        <svg class="espaciadoFlecha" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="fill: rgba(0, 0, 0, 0.65);transform:rotate(-90deg) ;"><path d="M11.178 19.569a.998.998 0 0 0 1.644 0l9-13A.999.999 0 0 0 21 5H3a1.002 1.002 0 0 0-.822 1.569l9 13z"></path></svg>

                    </div>
                </div>
                <div class="row border rounded cajas pt-2 mt-2">
                    <div class="col-md-8">
                        <h2>Informes & centro de seguridad</h2>
                    </div>
                    <div class="col-md-1 mx-5 pt-4 ">
                        <svg class="espaciadoFlecha" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="fill: rgba(0, 0, 0, 0.65);transform:rotate(-90deg) ;"><path d="M11.178 19.569a.998.998 0 0 0 1.644 0l9-13A.999.999 0 0 0 21 5H3a1.002 1.002 0 0 0-.822 1.569l9 13z"></path></svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
