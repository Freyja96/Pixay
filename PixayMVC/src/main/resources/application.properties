spring.application.name=PixayMVC

server.port=8080

spring.thymeleaf.cache=false

# H2 en memoria para usuarios/roles de la app MVC
#para poder tener el h2 en memoria:
spring.datasource.url=jdbc:h2:file:./pixay_mvc_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa

spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Espera a que Hibernate cree las tablas, y solo despuï¿½s ejecuta los scripts SQL
#spring.jpa.defer-datasource-initialization=true

# Credenciales para conectar con la API
api.auth-username=admin
api.auth-password=admin

api.base-url=http://localhost:8081/api/api/
api.auth-url=http://localhost:8081/api/auth/
api.credential=admin

# Tamaño máximo del archivo (ej. 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB